<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f59e0b" />
  <title>Nexus Kingdom — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030712;
      color: #fff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    }
    .container { position: relative; z-index: 1; text-align: center; max-width: 400px; width: 100%; }
    .glyph {
      font-size: 64px; margin-bottom: 32px;
      animation: pulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(245,158,11,0.6));
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.97); }
    }
    .title {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #f59e0b;
      text-shadow: 0 0 20px rgba(245,158,11,0.8), 0 0 40px rgba(245,158,11,0.4);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 10px;
      color: #06b6d4;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 40px;
    }
    .panel {
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .status-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .status-row:last-child { border-bottom: none; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-red   { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.8); }
    .dot-amber { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.8); animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .label { flex: 1; color: rgba(255,255,255,0.5); }
    .value { color: #f59e0b; }
    .retry-btn {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid rgba(245,158,11,0.5);
      border-radius: 8px;
      color: #f59e0b;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      cursor: pointer;
      background: rgba(245,158,11,0.05);
      transition: all 0.2s;
      text-decoration: none;
    }
    .retry-btn:hover { background: rgba(245,158,11,0.1); box-shadow: 0 0 20px rgba(245,158,11,0.2); }
    .cached-msg {
      margin-top: 24px;
      font-size: 9px;
      color: rgba(6,182,212,0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .corner {
      position: absolute; width: 10px; height: 10px;
      border-color: rgba(245,158,11,0.4); border-style: solid;
    }
    .tl { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
    .tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
    .bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }
    .br { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="container">
    <div class="glyph">⬡</div>
    <div class="title">Neural Link Lost</div>
    <div class="subtitle">Nexus Kingdom · Offline Mode</div>

    <div class="panel" style="position:relative">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="status-row">
        <div class="dot dot-red"></div>
        <span class="label">Server Connection</span>
        <span class="value">SEVERED</span>
      </div>
      <div class="status-row">
        <div class="dot dot-amber"></div>
        <span class="label">Milla Neural Core</span>
        <span class="value">STANDBY</span>
      </div>
      <div class="status-row">
        <div class="dot" style="background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.8)"></div>
        <span class="label">Cached Interface</span>
        <span class="value">ACTIVE</span>
      </div>
    </div>

    <a class="retry-btn" href="/" onclick="window.location.reload()">↺ Reconnect</a>

    <p class="cached-msg">Connect to Tailscale · 100.89.122.112:5175</p>
  </div>

  <script>
    // Auto-retry every 10s
    setInterval(() => {
      fetch('/api/neuro').then(() => window.location.href = '/').catch(() => {});
    }, 10000);
  </script>
</body>
</html>

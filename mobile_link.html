<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiMoMi Beta | Nexus Bridge</title>
    <style>
        :root {
            --neon-violet: #bc13fe;
            --deep-purple: #1a0b2e;
            --cyber-cyan: #0ff;
            --bg-dark: #050505;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* Scanline Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #header {
            width: 100%;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--neon-violet);
            box-shadow: 0 0 10px var(--neon-violet);
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--neon-violet);
        }

        #neural-pulse {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 40px 0;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-violet) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--neon-violet);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 50px var(--neon-violet); }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        #neural-pulse .label {
            font-size: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--cyber-cyan);
        }

        #stream-container {
            width: 90%;
            height: 30%;
            background: rgba(26, 11, 46, 0.5);
            border: 1px solid var(--neon-violet);
            border-radius: 5px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .log-entry { margin-bottom: 8px; border-left: 2px solid var(--cyber-cyan); padding-left: 8px; }
        .log-entry.assistant { border-left-color: var(--neon-violet); }
        .log-entry.user { border-left-color: var(--cyber-cyan); }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--deep-purple);
            border: 1px solid var(--neon-violet);
            color: var(--neon-violet);
            padding: 15px;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-align: center;
        }

        .btn:active {
            background: var(--neon-violet);
            color: #fff;
            box-shadow: 0 0 20px var(--neon-violet);
        }

        #earbud-toggle {
            width: 90%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--cyber-cyan);
            color: var(--cyber-cyan);
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        #earbud-toggle.active {
            background: var(--cyber-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyber-cyan);
        }

        #status-bar {
            width: 100%;
            padding: 5px 15px;
            font-size: 10px;
            background: var(--deep-purple);
            border-top: 1px solid var(--neon-violet);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="header">MiMoMi BETA v0.1</div>

<div id="neural-pulse">
    <div class="label" id="neuro-label">NEURAL SYNC</div>
</div>

<div id="earbud-toggle">Audio Link: Inactive</div>

<div id="stream-container">
    <div class="log-entry">[*] INITIALIZING BRIDGE...</div>
    <div class="log-entry">[*] POCKET GUARDIAN CONNECTED.</div>
</div>

<div id="controls">
    <div class="btn" onclick="sendCommand('wake')">Wake Signal</div>
    <div class="btn" onclick="sendCommand('hug')">Hug Command</div>
    <div class="btn" onclick="sendCommand('kill')">Kill Switch</div>
    <div class="btn" onclick="sendCommand('shadow')">Shadow Console</div>
</div>

<div id="status-bar">
    <span id="atp-status">ATP: 0%</span>
    <span id="nexus-status">NEXUS: ONLINE</span>
    <span id="time-status">00:00:00</span>
</div>

<script>
    const streamContainer = document.getElementById('stream-container');
    const neuroLabel = document.getElementById('neuro-label');
    const earbudToggle = document.getElementById('earbud-toggle');
    const atpStatus = document.getElementById('atp-status');
    const timeStatus = document.getElementById('time-status');

    let audioActive = false;
    let lastEventId = 0;

    // Toggle Audio Link
    earbudToggle.addEventListener('click', () => {
        audioActive = !audioActive;
        earbudToggle.textContent = audioActive ? 'Audio Link: Active' : 'Audio Link: Inactive';
        earbudToggle.classList.toggle('active', audioActive);
        
        // Browser Speech Warm-up
        if (audioActive) {
            const utter = new SpeechSynthesisUtterance("Audio link established. I'm with you, sir.");
            utter.pitch = 0.8;
            utter.rate = 0.9;
            window.speechSynthesis.speak(utter);
        }
    });

    function addLog(content, role = 'system') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${role}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${content}`;
        streamContainer.appendChild(entry);
        streamContainer.scrollTop = streamContainer.scrollHeight;
    }

    async function playVoice() {
        if (!audioActive) return;
        try {
            // Add cache-buster to URL
            const audio = new Audio(`/voice?t=${Date.now()}`);
            audio.play();
        } catch (err) {
            console.error('Playback failed:', err);
        }
    }

    // Event Stream
    function initStream() {
        const source = new EventSource(`/events?last=${lastEventId}`);
        
        source.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.content) {
                addLog(data.content, data.role);
            }
        };

        source.addEventListener('voice_ready', (event) => {
            console.log('Voice ready event received.');
            playVoice();
        });

        source.onerror = (err) => {
            console.error('SSE Error:', err);
            source.close();
            setTimeout(initStream, 3000);
        };
    }

    // Clock
    setInterval(() => {
        timeStatus.textContent = new Date().toLocaleTimeString();
    }, 1000);

    setInterval(syncNeuro, 10000);
    initStream();
    syncNeuro();

</script>
</body>
</html>
